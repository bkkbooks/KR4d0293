front:
  text: 且向羅浮喚夢回玉骨風標自仙種鐵腸賦詠謾多才只應賸結青青子調鼎功夫看後来
  hash: sha256:7763f1295c4eb645807ba0b12b55a3cda8a692aa9edb21d0d0932f1fd2b4cf51
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0293_WYG_002-1a, image: WYG1170/WYG1170-0142c.png}
body:
  text: 窗軒一窻開永晝萬象出天成風力欺楊絮雷聲喚笋萌愁多春不願病起眼猶眀最喜今朝雨川原足暮畊過王氏雲莊十里雲莊路東風信杖藜好花連夜發幽鳥傍人啼香宇禪心冷山容醉眼迷老僧春睡處眀月印樓西孤吟世景雲来去人情水淺深塵埃從滿眼交友欲知心山簡豈愛酒陶潛元解琴對人不敢語仰靣數歸禽深夜風雨有懷故人心馳流水髙山外身在落花啼鳥中滴得愁濃青杏雨吹教夢斷碧梧風垂堂逺愧千金子掃地空憐一畝宮兩朶燈花伴孤獨清懽那得玉人同首夏千里辭家不作難歸來春事總䦨珊乆留午夢梅黄雨重索冬衣麥秀寒百箔老蠶鋪雪乳一庭新竹長琅玕此時正喜民財阜野草閒花任自殘湖上舟載閒雲穏湖光盪碧天笑㸔沙上鳥終日伴雛眠深夜獨歩思兄南伯舉杯扣門則卧矣緑柳橋邊古道横乾坤寂寂夜三更月窺門處君髙卧露溼衣時夜獨行杯酒孰同驅俗意天風時下歩虚聲眀朝世界塵依舊試挽銀河一洗清丈亭渡阻風捲地西風翻巨浪小舟仍泊夜來灣行沽携榼雖無酒卧㸔開篷幸有山原草正肥黄犢飽汀蘋未老白鷗閒平生遇險湏知止眼對江神一解顔湖上好景難逄柰老何十年此地絶經過山如得意晚猶碧雨亦知愁秋更多造化從渠旋磨蟻功名笑汝撲燈蛾湖邉直欲呼船去更共漁人掛緑蓑晚興風靜湖光一鑑浮青山四顧淡舒秋松隂滿逕歸來晚醉看巖花笑白頭夜渡鄞江睡起開篷月在沙晚江山影動龍蛇詩成索筆無人應酒盡空嚢何處賖船去船來數聲櫓江南江北㡬人家星娥定怪歸來晚從此西風欲泛槎南溪聞說南溪好肩車帶雨來澗泉鳴細石松木衣蒼苔雲笑人情薄山隨客語回黄花幽意足知復為誰開次靜海令蓋晞之食蟹吳中郭索聲價髙草泥足上生青毛越中海市喧兒曺白蟹厭飫霜前螯新豐逆旅酒濯足齊國相君飯脫粟當時珍味無所需吳越土宜俱碌碌復遊鄞江欲扣山扉汲野泉支笻眼駐柳隂邊苦無平地休穿屐待有輕風却放船孤笛呌開雲裏月一竿撑破水中天舟人相戒低聲語沙上恐驚鷗鷺眠次孫燭湖秋夜有感忽作清宵夢非闗世累長月隨花影轉水照木隂凉浴露千峯碧梳風兩鬂蒼眀朝湏洗耳秋意過寒螿舟中木落山髙秋去後犬驚人語夜深時小舟滿載離愁重惟有孤鳴寒雁知又一水分流無限曲兩山相對不知名漁翁夜半歸南陌認作中流擊楫聲秋晚斷雲送歸雁斜陽眀晚楓西風灑雙鬢醉倚危䦨東髙選江邨遺槁題家信後十載慇懃訓子情禮闈今幸占㣲名彤庭䇿獻三千字鵬海風摶九萬程帽揷宮花瓊宴罷身沾仙露賜衣榮瞻雲北闕人迢逓空憶髙堂雪鬂生瑞安縣詠懷一經逢聖世銜詔下神州才陋慚無補官卑得自由刑威存撫字賦役敢誅求何日乗公暇溪山策騎遊太息時擢武當軍節度天運逢南度和成勢已移山河憐破碎草木亦傷悲鐵騎馳中土烽塵隘北陲哀臣䨇淚眼豈畏朔風吹髙邁夜泊李陽驛風拂烏紗兩髩秋李陽溪上夜停舟市燈閃月聞鳴犬城柝敲風起睡鷗千里逺馳承寵命通宵不寐為民憂幽懷自信清如洗獨倚篷窻看斗牛勉壻史彌大老朽歸田乆烏紗白髮新經綸天下事都屬少年人建德縣詠懷日午琴堂吏散衙不愁鬂雪㸃烏紗訟清犴獄塵封草人靜公庭鳥啄花惟願兒童無凍餒每令野老勸桑麻聖恩未報吾心赤肯效青門學種𤓰道傍菊荆棘叢中是故隣更無君子與相親含英吐秀西風裏空把芳心向路人寒梅野雀圖隂隂榕葉覆寒梅山逕無踪盡緑苔啼鳥自知安穩處成羣飛去又飛來質齋田園偶興繞簷風景接崆峒生計年年樂嵗豐布榖聲傳紅杏雨闕調起緑楊風桑麻逺近千村裏禾黍髙低一望中每與隣翁相慶社醉歌不惜酒樽空溪石呈李思道共坐溪邊石溪清心自涼魚驚烟艇過鷗笑野人忙細草侵衣緑飛花㸃鬂香東風塵暫息拍手送斜陽復和呈莫仲箎溪石綉苔緑溪風飃晚涼坐久得自若物外知誰忙渇飲竹泉冷饑飯松花香春光忽云暮闕陽紀興湖上人家萬木村白雲深䕶讀書門年來不管頭顱白自賀清風酒一樽秋日溪亭簾捲柴桑晚深山俗駕踈荒苔留鶴跡落葉帶蟲書竹翠侵香案泉聲潄石渠烟霞便一枕應笑把犁鋤遁翁僻性僻性一生忘嗜酒勞神終日倦吟詩尋常髙卧松床穏不管庭前鶴到遲曉逕蘿逕朝飛雨莓苔染翠濃登山雙屐健自擬少年同春暮石橋門外送斜暉栁洒清風透客衣老眼看花能有㡬如何啼鳥暮春歸市橋晚坐隔眼風塵寢閒心照水清牛羊歸古坂鷗鷺集浮萍倦我思垂釣知誰共濯纓湖光浮一鑑倒暎夕陽眀秋晚風掃柴門凈銀燈吐玉花納涼憑闕石待月上窻紗老去心猶壯秋來鬂任華不妨髙枕睡無夢到公家自詠遁翁虛名蝸角不攖情老木棉裘分此生世事只隨今日過心田留待後人耕舊書豈厭從頭看險路何妨退歩行俯仰欲求無所愧舉頭惟對月華眀甥舅同登進士亦世之不易得者今幸逢其㑹因吟一律以寄一以表祖宗積善之徴二以謝聖主寵賜之榮三以致勉忠之意二子惟朂諸潦倒山林已二毛忽聞闕下衡茅祖宗積德幸多世甥舅何妨共奪標栁拂祥光看虎榜杏扶春色上雲袍從今莫作懷家計湏効忠良答聖朝髙似孫踈寮小集入餘杭縣眀發遵西陸驅車月流光佳山迎車來知是古餘杭危樹露如雨平野日未陽支流滀清源弱羽無髙翔人家叢灌下世載山水鄉扣門作午憩白飯羞文魴邂逅有足歡離合非其常主人不予鄙予留亦徜徉憇昌化民家晚程息勞轍白日流西暉水鳥得魚去耘夫荷鋤歸川原杳芊緜林野雜依霏一来扣竹館相邀入荆扉重巖吐清溜澄隂布殘馡曰予考此室十世相因依左右桑果足嵗日雞豚肥豐猶未至裕歉亦無能饑予聞良自惬欲謀北山薇有田可同耕有蠶當共衣車夫猝無情此志仍重違荅李才翁素意杳難尋殘鑪屬晚隂花知西洛事雁呌北人心客共艱難盡詩隨老大深金陵書不到消息又沉沉宋江都研數寸清純玉不如入波陶髮冷蕭踈千金爛抵荆山鵲一璞深刳渭水魚墨帶花香臨近澗泓沉燈影了殘書從来端歙難優劣名下真成士不虚答宇文文學無能應俗苦皇皇詩不驚人筆事荒天下無山如飯顆人間有水自滄浪左杯右蟹一舟足早韭晚菘三畝強莫謂覺來無可嗜逢人猶自覔花忙燕文貴山水圖道山堂上御府畵展巻猶能記老燕十日何由辦水石千金乃可分江天楚湘兩岸風落木海嶽三秋雁度川大山小山俱好隠江南夢去曲肱眠答武昌吳廣文平生不識武昌樓官柳青青好在不庾亮笛吹黄鶴月簡栖碑駁碧苔秋山横赤壁含情斷水出瞿唐快意流何處呌君同一醉並舟秦女擘箜篌延祥觀水眀一色抱神州雨壓輕塵不敢浮山北山南人喚酒春前春後客凭樓射熊館暗花扶扆下鵠池深柳拂舟白髮邦人能道舊君王曽奉上皇逰丹砂歌謝胡使君恵砂床宜州丹砂産暘谷不比辰溪攅箭鏃素霓深抱赤城霞斬猩半染于闐玉海日下照珊瑚紅化為奼女金芙蓉一從擘華分禹璞猶有絳炁埋雲峯鑄鼎泥壇有消息坐看光輝成五色淮南雞犬亦同升九轉真能生羽翼琶琶引人生聚散難為别何况匆匆作胡越梅梢帶雪下昭陽眀朝便隔闗山月長城不戰四夷平臣妾一死鴻毛輕回憑漢使報天子為妾奏此琵琶聲長安城中百萬户家家競學琵琶譜酸聲苦調少人知食雪天山憶蘇武西風吹霜雁飛飛漢宮月照秋砧衣嫖姚已死甲兵老公主公主何時歸銅雀硯歌曹公夜讌凌雲臺一言契濶含餘哀分香老伎各雲雨歌舞不盡埋蒿莱漠漠頽基鄴山下萬里烟塵無一瓦井幹罇酒自平生烏鵲飛南播遺雅老農墾雨開荒寒一礫千金苔未乾世人好竒不好近直比周簋仍商槃老璞渾渾殊質魯得水猶能發妍嫵更與人間作瓌古月眀夜盗西陵土黄居中瀟湘圖歌天暒而雨斷兮作蒼梧九疑之髙秋風行而川怒兮洩瀟湘洞庭之奔流樹不知名兮山抱複嶺沙不計程兮水趨它洲波作止兮蛟舞蛟蟄雲晦眀兮猿呼猿愁原不可作兮蘭亦塵土賈傅歸漢兮鵩其何尤誰呼魚兮北墅有酒誰鼔枻兮南津有舟懷斯人兮杳靄千里目悵望兮吾其歸休寄吳鈐幹有偉千人傑能為萬里遊挂帆春背鴈問驛夜驚鷗道路空留滯文章莫暗投九疑生雨徧三峡帶寒流采藥青神觀題詩白帝樓乾坤供爛醉星斗照閑愁漢已歸蕭相天難夀武侯詞人頭欲雪壯士淚如秋中下猶湏策西南夙倚籌有錢書盡買滅㓂志終酬猿破髙唐夢龍馴灧澦舟行人定安穩夏近可歸不騎鸞引贈句曲山吳道士夜騎白鸞出琳闕三萬仙官鏘珮玦雲雷帖妥過剛風左推日丸右扶月一息瑶池翠水家阿母迎謁龍驅車青娥彈絲玉妃酒折盡蟠桃紅玊花九天丈人来問道太極之前天不老丹霞一炁玉樞宮寳笈金繩容探討井君沐浴波五色洞房光芒上奔日天上傳呼六丁直星斗離離礙鸞翼菊磵集
