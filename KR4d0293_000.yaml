body:
  text: 菊磵集别集類三宋提要臣等謹案菊磵集一巻宋髙翥撰翥字九萬號菊磵餘姚人孝宗時遊士也有菊磵集二十卷久佚不存至國朝康熙二十六年其裔孫士竒于徐乾學宋槧書中採得遺詩一百九首合以家藏三十二首又于他集中得十三首續得朱彝尊宋刻江湖集所載四十七首刪除重複共得詩一百八十九首刻之題曰信天巢遺稿信天巢者翥所居室之名然巻首元貞元年姚燧序本稱曰菊磵集不知何以改名也後附林湖遺稿為翥姪鵬飛字南仲者所撰江邨遺稿則翥父選及其叔邁之詩選邁皆紹興間登第選官武當軍節推邁官縣尉此巻之中又附質齋遁翁二人之詩則髙氏譜中所載僅存其號即士竒亦莫能舉其名矣最後附髙似孫疎寮小集似孫即撰緯略者文獻通考載疎寮集三卷此所刻甚少尚有他選所有而此刻無之者其集在宋末頗著稱陳振孫謂其作文怪澀詩猶可觀劉克莊謂其詩能參誠齋活句不知此刻何以採輯轉不完備然士竒後序中初未言及附刻疎寮集疑又為士竒後人所加更不暇博採歟乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀菊磵集原序菊磵集者髙君九萬翁之所作也九萬舜江人諱翥號菊磵世居越之餘姚少頴㧞不覊抗志厲節好讀奇書厭科舉學退然信有天命隱居教授師道尊嚴弟子造其門者隨其材器教之皆有成就家雖貧非其義一介不取扁所居曰信天巢而樂乎道采菊英酌磵水蕭然遊憇操􅒀詠歌凡所交皆碩士既而遊錢塘越金陵浮洞庭彭蠡吊古今名山大川蓄諸心胸發於聲詩以鳴當世載諸羣選耄年躭西湖之形勝周君文璞詩酒相與遂卒於寓舍􅌾杭之葛嶺談家山平生特崇志節出乎人表煥爛文章在人心目其姪鄉貢進士南仲甫痛其文墨外遺十亡八九殘編綴之斷簡拾之僅存者百七十章成集而家傳焉今曾孫名師魯者持其集屬予序予盥手閲之知其氣象渾厚不務險恠艱湥哀樂皆適其中辭氣圓美流轉如彈丸則其功也精矣足有闗於風化者哉實當代之儒宗良有以備後之觀也惟公父曰選叔父曰邁紹興間繼登科第伯任武當軍節推叔任縣尉各有婿一為寳學尚書王佐一為宗正少卿史彌大榮冠當時迄今詩禮相襲道義相宣藹然而盛實自菊磵翁啟之也今遺墨之存非專美於家之有傳而亦幸于世之有傳矣為其子若孫者當景仰而慕之予與髙氏斯文久契序可得而辭乎於是書其要於巻首旹元貞元年春三月既望榮禄大夫翰林學士承㫖姚燧序寒家本燕人宋開國初寳臣公諱瓊者隨宋太祖決策定難歴官忠武軍節度封衛國公加太尉遂家於汴再傳紹先公諱繼勲生子六人遵甫公為宣仁皇太后外戚俱有武功世封王爵南渡時賜第臨安子孫多官禁衛慮為賈秋壑所嫉散居杭之海寧越之餘姚使各奉祠祀菊磵公者㓜習科舉學下筆輒異長乃卓越不覊曰此不足為吾學也放情吟嘯所交如杜仲髙張荃翁周晉仙皆一時名流共相倡和紫髯廣顙尤善談論與人欵欵無間言忽值莊語則凛不可狎陳復齋宓許錬菴復道交誼最篤二公遊宦多與之俱晚年歸隱西湖棄竒就實淳祐元年卒於湖上年七十有二葬葛嶺談家山載郡誌實宋之隱君子也余十四歲時從先君子歸姚江過上林湖拜節推縣尉墓松杉髙茂掩映湖水四百餘年封植如故可謂子孫善守矣自是住深栁讀書堂者兩月堂為先曾祖講學之所門臨清溪深栁成巷先君子更増植之髙氏家祠在堂之西偏規模𢎞敞堂室門廡畢具族人子弟肄業其中堂後樓五楹藏當年誥勅書籍舊刻菊磵南仲兩公詩藁及姚承㫖王學錄原序缺略不全詢諸父老云自明嘉靖間遭倭冦焚掠散失殆盡亦無從得其遺本補輯之若節推縣尉之詩僅存數首又有質齋遯翁譜失其名詩亦清逈余恐殘板久復漶漫洗而錄之頃在都門從御史大夫徐公所藏宋板書籍中得菊磵詩一百有九首合向之所録三十二首又於他集中得十三首頃同年朱竹垞復從宋刻江湖集中􅊧示四十七首統計重出者十二首前後凡五七言近體詩一百八十九首竊念先賢遺稿忍使湮没不傳遂併南仲節推縣尉之詩同付剞劂而附質齋遯翁詩於巻尾海内藏書家或有收其遺集者毋吝寄示獲成全璧實至望焉康熙丁夘十二月朔日江村髙士竒
