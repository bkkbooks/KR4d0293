body:
  text: 菊澗集宋髙翥撰春日即事人間間日月春後乍晴隂半夜雨聲急一溪流水深鳥啼花自發詩就客能吟短䇿西湖路幽芳信意尋送别老去情懷怕别離年來不作送行詩人前舉似終難信問著垂楊便可知春日北山二首人緣白石溯清溪手剝蒼苔認舊題春色滿山歸不去拆桐花裏畫眉啼插花吹笛兩山中桃李尊前日日同待得馬頭飛絮滿更來沽酒看殘紅僧房夜坐萬枝松裏一篝燈知是山房第幾層靜夜數聲清磬響上方應有誦經僧訪諸葛鍊師不遇青銅留著布囊中去謁人間小卧龍久欲共君謀一醉有錢卻又不相逢雜興二首新分菊本自鋤山手縛枯藤作矮闌比似著書空用力種花猶得一年看二十年前欲住山不禁寂寞掩柴關如今寂寞禁當得欲掩柴關又却難秋日田父辭二首啄黍黃雞沒骨肥繞籬緑橘綴枝垂新釀酒旋裁衣正是昏男嫁女時少婦挼藍旋染裙大兒敲葛自漿巾新摘摘笑欣欣相喚相呼看賽神孤山雪後雪後騎驢行步遲孤山何似灞橋時近來行輩無和靖見説梅花不要詩天台曹園蔡嶺桑麻地曺家桃李莊溪流春水滑梅度晚風香竹屋解留客筍輿休俶裝平生看花法不學蜜蜂忙西湖春雪小艇沿湖看雪飛正當騎馬踏春時是誰乞與楊花舞先占東風一月期間居雜興三首開門遣蠻童買花供銅佛春風隨花來為我一披拂風和花氣清下簾休放出回施佛因果供此老詩骨點鐙酌春酒襞紙題小詩讀盡列仙傳引調學語兒自飲復自笑不覺春漏遲且了今日事眀日還任之杜鵑休忉忉布穀休聒聒無田不須耕無家自能活行藏莫非時造化安可奪更放心地寬出門行路闊春日湖上乘興行新路凝情獨老翁馬蹄春草上人影夕陽中飛絮沿湖白殘花染浪紅晚歸雲氣合雙槳破空濛春懷江南春盡尚春寒添盡征衣獨掩關日暮酒醒聞謝豹所歡多在水雲間過臨平江帆一似白鷗輕起揭船篷看曉晴梅子著花霜壓岸自披風帽過臨平古廟古廟依喬木開門對淺沙短籬紅槿樹深徑碧苔花屋破香煙濕庭空日腳斜山寒無賽鼓鳴噪集神鴉古寺山路荒涼出小亭土墻斑駁帶枯藤欹斜古殿三尊佛黯淡寒篝一點燈碣石半磨天寶字禪房空老政和僧頭陀禮拜迎人説門外浮屠欠兩層卜居結屋離黃道開門對白沙一莊千古月三徑四時花客至旋沽酒身間自煮茶相聞蟲鳥外不復聽喧譁秋日三首旋買扁舟載一翁片帆吹下夕陽東西風欲織江頭錦催染秋林葉葉紅庭草銜秋自短長悲蛩傳響答寒螿豆花似解通鄰好引蔓殷勤逺過墻獨客飄然物外遊江南江北總宜秋芭蕉昨夜緣何事和雨和風作許愁松溪廟廟自何年立門深晝不扃寒藤扶壞壁秋草帶疏櫺溪接東西碧山分逺近青老巫逢客至謾説有神靈蓮實膩玉肌膚碧玉房纍纍波面趂紅芳坐忘佛土三生夢來結人間一夏涼青子綻時仙掌濕緑包分處蜜脾香尊前笑摘酬風露猶記西湖古栁傍無題二首獨展羅衾無夢成寶香熏徹轉愁生癡心不願郎思妾只願郎今厭客情風竹蕭蕭淡月眀孤眠真箇可憐生不知昨夜相思夢去到伊行是幾更秋興數聲新鴈夜初長曉起開門衣袂涼籬菊褪黃秋興懶瓦溝才試一痕霜秋晚即事江頭風葉舞低回催得濃雲頃刻開萬里碧天紅日晚數聲新鴈送寒來毋自欺齋夜宴毋自欺齋清更嚴齋中人物斗之南七朝宰相得瞻仰四海詩人交笑談古調喜聽琴再弄深杯休惜酒重添玉堂今夜無宣喚且與江湖作小參曉出黃山寺曉上籃輿出寶坊野塘山路盡春光試穿松影登平陸已覺鐘聲在上方草色溪流髙下碧菜花楊栁淺深黃杖藜切莫匆匆去有伴行春不要忙育王寺曉䇿烏藤上育王入山隨處得徜徉碑頭龍護先皇字塔下魚懸外國香遍謁僧房嘗苦茗間聽社媼説豪光山深日短行難盡僧遣頭陀辦客牀春日湖上清波門外放船時盡日輕寒戀客衣花下笑聲人共語栁邉檣影燕初飛曉風不定棠梨瘦夜雨相連薺麥肥最憶故山春更好夜來先遣夢魂歸黃居士山房浮利浮名心已灰三間茅屋白雲堆先生自釀松精酒侍女能持藤癭杯飬鹿曉隨原草去放猿時摘野花來近聞身口渾無纍槲葉黃青繞宅栽育王寺精藍遊歷地景物自情親鶴引登山客僧迎禮塔人名花千佛供喬木萬夫身碑刻東坡作重來為拂塵送春韶光催去太無情祗為東君去住輕雖欲遲留芳草夢如何禁得杜鵑聲桐花快落春風老梅子微酸晚雨晴從此嬉遊時節少不須日日報詩成秋山散步乍晴沙路軟於塵新著芒鞋更可人誰道秋山不宜客桂花多處勝行春即事秋來髙處不宜登間却西樓最上層讀罷黃庭窗戶晚自敲清磬上香鐙烏鎮普靜寺寺沈休文故居也寂寞梁朝寺深廊十數間碑存知殿古香冷覺僧殘斷岸舟橫浦平坡樹補山休文如好在依舊帶圍寬渡錢塘小立晴江上潮生落照邉晚花低映水春草暗迷煙燕子飛官驛鷗羣引客船關情南浦别相對獨依然七夕一枕新涼供醉眠覺來風物已凄然山雲帶雨重重合宮樹鳴秋葉葉顛滿進一杯酬好節休看兩鬢換流年雙星回闕癡兒等容我長齋繡佛前荆棘中見梅花荆棘叢中數點春春雲態度月精神依然竹屋茅櫩下靚女盈盈不嫁人感春人事日紛紛不知春已分問梅成緑葉看杏落紅雲燕向晴空語蛙從夜靜聞感時傷老大孤坐對罏熏送劉允叔主簿歸山中浮利浮名挽不來故山歸去恰春回馬蘭旋摘和松鬻枸杞新生傍菊栽庭樹夜留山鳥宿洞門早為野雲開眀年我亦天台寺相伴芒鞋踏古苔江居曉詠家住清江江上村江雲山影自平分幾回早起開門看不見青山見白雲題二小姬扇二首慶娘顰翠眉春瘦怯羅衣笑問采花蝶如何成對飛湘湘未識羞獨坐抱箜篌貪學耆婆舞擡身拜部頭小樓雨中雲浮江雨暗獨客苦淹留白髮羞眀鏡青山對小樓酒功書下下心事付悠悠安得并州剪從頭翦斷愁首夏漾漾池塘碧染衣隂隂草樹緑成圍江村寂寞春歸後一點楊花不見飛寄方巖緑髮仙人山澤癯出遊入息幾曽拘種花甚少四時有諌草不多千古無閲世眼髙磨日月好賢名重滿江湖行藏到得無心處鐘鼎山林豈異塗自賦蝸角蠅頭總是虛何須留戀市朝居老於親戚情當密貧與公卿分合疏小澗草荒元種菊故山塵滿舊鈔書幾時歸去重經理嘯月眠雲得自如蕺山登髙醉眼橫斜看菊枝又成客裏過佳期去年行路猶持酒今日登髙懶賦詩老淚怕從衣褎見間情但有帽櫩知阿髯故國才歸得嵗嵗須來舉一巵戌婦吟二首將身託戰爭世事百無情相對坐離别渾如落葉輕辭家出戍邉北望隔青煙怕作沙場夢秋宵不敢眠重遊無量院佛屋欹斜老翠微小軒猶記昔遊時江雲帶雨涼生竹野水迎潮暗入籬門外風波僧自識山中朝暮客曽知眼眀素壁關情久十載才能為此詩春霽積雨才收雲盡歸長空一色碧琉璃日移簾影臨書案風颭瓶花落硯池巢燕學飛猶戀母籠雞得食旋呼兒眼看景物關情甚喜為新晴賦此詩嵗除登岝崿山精舍蕭寺經行無盡情倚闌長是眼增眀溪因宿雨十分急山為凝寒一味清竹外飛花隨晚吹樹頭幽鳥識春聲重來又是眀年事臨出門猶欵欵行張氏曲江一曲澄江兩派分滿山修竹緑齊雲矮窗風月侵帆腹小徑煙霞隱屐痕白鷺夜依花影宿清猿時共櫓聲聞主人與客心如水同倚闌干得細論登九華樓髙閣臨江可契心興來時得一登臨山雲浦樹重重合野水汀蒲日日深鴉背夕陽供晚哺蟬迎涼吹試秋吟倚闌盡見諸峰出如對風流李翰林趙仲莊都鈐山居一官難換北山薇結屋栽花度四時果熟不妨禽摘盡酒香惟恐客來遲小蘋低唱花間曲何廣髙吟李下詩客久辦心分半隱尚嫌風骨欠仙姿船户盡將家具載輕舟來往長江春復秋三世兒孫居柁尾四方知識會沙頭老翁曉起占風信少婦晨粧照水流自笑此生漂泊甚愛渠生理付浮悠歸寓舍門前流水碧粼粼嵗晚歸來亦可人梅欲開時多是雨草才生處便成春嬌兒對面兩癡絶老子關情一欠伸快取竹篘篘濁酒舉杯先為洗京塵憶西湖西湖春二月結客少年遊駿馬黃金勒長身紫綺裘愛花論擔買嗜酒滿船浮兩載緣何事台州又越州小樓雨中長安市上僦樓居間裏身心儘自如十日雨聲春對酒一窗鐙影夜觀書茶經未展愁先醒藥録才看病已除所欠短櫩晴景好拆桐花下共扶踈喜鄉友來蕭蕭春夜雨有客渡江來世事攢眉説鄉談信口開晚肴供苦筍時果薦青梅甚欲澆離恨呼鐙撥酒醅春寒料峭東風破客衣春寒不比臘前時絶憐墻角櫻桃樹全似梅花雪後枝昌國縣普濟寺小亭鯨海中流地龍峰小洞天亭髙先得月樹老久忘年大士居鄰境間僧指便船若為風浪息更結補陀緣春情四首樓頭上馬苦匆匆百計相留無計從正好看花郎却去江邉春色為誰濃天涯海角水雲寬人在吳頭楚尾間彈徹箜篌難寄恨海棠庭院獨憑闌深院沉沉照落暉寶香熏徹舊時衣一春行樂誰為伴羞見花前蛺蝶飛鬬草歸來上玉階香塵微涴合歡鞋全籌贏得無人賞依舊春愁自滿懷晚春即事輕煙終日鎖樓臺細雨絲絲半濕苔杜宇一聲青嶂外溪流時送落花來蕺山戒珠寺寺王右軍故居也葉葉東風吹客衣昌安寺裏晚遊時欹斜竹屋羲之宅磨滅經幢帥府碑佛化是誰留實相鵝亡猶自見方池逄僧小作煎茶供略問源流笑不知冬日即事江上凝冰約水痕門前殘雪綴溪雲杖藜獨立梅梢月成就清寒到十分訪銛朴翁不遇二首亂花飛絮趂長髯來訪西湖竹裏庵行晝白雲三十里詩人又在白雲南乘興尋僧入翠微山中無限野薔薇主人不見從誰賞折得繁枝自插歸聚景園口號二首淺碧池塘連路口淡黃楊栁護櫩牙舊時嵗嵗春風裏長見君王出看花竹影參差臨斷岸花隂歷寂浸清流遊人難到闌干角盡日垂楊蓋御舟恭跋思陵宸翰拓本卷後淡黃越紙打殘碑盡是先皇御賜詩白髮內人和淚讀為曾親見寫詩時山行即事二首落盡桐花春已休過墻新竹籜初抽山行步步黃泥滑小立溪橋聽雨鳩捲地東風晚更狂櫻桃吹子落泥墻溪雲自為催詩黑忙殺條桑窈窕娘寄林徴君老無間事上雙眉問著窮通盡不知兩鶴忽飛因客到一牛方病得妻醫案頭幾卷隂功録壁上諸家勸世詩見説今年公八十鬢邉才有數莖絲曉行跨馬登長路聞雞度逺關水光斜漾月雲影倒薶山人迹霜橋外禽聲煙樹間自慚林下客清夢未曽還三峰廢寺荒林依約舊山門秋草離離故迹存雙瀑有聲傳宿雨一龕無地住間雲蝸沿壞壁丹青古龜負殘碑字畫昏三歎廢興誰可問亂鴉鳴噪自成羣下塘二首河水新添三尺髙河邉蘆葦有龜巢波流夜夜飄漁箔空點籃燈照樹梢日出移船日又斜蘆根時復見人家水鄉占得秋多少岸岸紅雲是蓼花行淮老翁八十鬢如絲手縛黃蘆作短籬勸客莫嗔無凳坐去年今日是流移蘭亭老來渾不愛春遊來對蘭亭爛漫秋亭下水非當日曲山前竹似舊時修二三客子因懷古八百餘年續勝流試與山靈論往事不知還肻點頭不贈丁子植撫幹幕府歸來赴調時清聲籍籍滿京師真如白璧藏竒石判得黃金博斷碑借宅先尋籠鶴地買盆權作養魚池客中髙致猶如此眀日還山樂可知天章寺地勝秋清人欲仙倚闌時節月初圓不知寺在煙霞表但覺身臨星斗邉寶墨舊歸天上去髙名今向世間傳登臨莫作匆匆會去後重來又幾年天衣寺萬壑千巖非浪聞十峰雙澗不須論袈裟旋化空王服宮觀曾招帝子魂山向馬頭回禹穴溪分燕尾入雲門秋行既了登臨願草草題詩對緑尊毅齋鄭祕書道山領客羣玉堂前春晝隂主人領客步清深上方圖畫無真贋東壁詩書有古今手轉玉璣看測日指揮金井試為霖山翁不作蓬萊夢但願時來洗此心元日長憶兒時二老傍元正嵗嵗有風光攙先禮數修人事著好衣裳侍酒觴回首不堪追日月感情空嘆換星霜尚期我老如親老却看兒童作節忙重五日懷舊獨守空庭日欲晡滿斟濁酒不須沽白頭兄弟三年别青眼交遊一字無醉看葵榴懷舊事饞思櫻笋夢吾廬向時癡絶今愁絶自讀離騷些老夫贈番陽程克已見説番陽有老程與人懷抱亦分眀一千里外未識面二十年間長慕名因聽酒邉談舊事便從客裏定交情他時我老君猶健海內重逢即弟兄初聞雷聲二月寒猶在春雲濕未開灑窗終夜雨發軔數聲雷薺麥緑生腦棠梨紅拆腮西湖花事動從此日裴回靈巖寺天柱峰髙逼太清靈巖端足擅髙名人間有石皆奴僕天下無山可弟兄樵徑雪深多虎迹清溪風暖盡猿聲客身元是山林種見此如何不動情秋夜小屏相對兩眉攢長夜迢迢不肯殘鼠向燈前窺坐卧人從夢裏説悲歡故山無計行秋晚客路從誰守嵗寒留得濁醪相慰藉酒腸猶喜十分寬寄王仲彞仲彞留三衢久不歸省因以針之别君三見雁南飛夢裏相逢覺又非書去不知何日到人來先問幾時歸正堪燈火親書卷莫遣塵埃染客衣二老倚門知己久交情於此亦依依李將自小在行伍得官因用兵籌邊頭髮豎入陳骨毛輕戰馬惜如命寶刀都有名酒酣常罵坐嫌客話升平無錫縣春日吳楚新岐路江湖舊散人放船來古縣沽酒供間身花卸一村雨鳥啼千樹春野塘風捲地無復見芳塵常熟縣破山寺古縣滄浪外精藍縹眇間木枯曾閲世龍老解分山鳥道秋迷迹禪房晝掩關詩成遊子去流水自潺潺曹娥浦泊舟夜宿曺娥浦停舟是幾更聞鐘知寺近聽櫓信潮生風向沙頭起天從柁尾眀夢回無意緒兩岸杜鵑聲拜林和靖墓玉函香骨老雲根占斷孤山水月村薦菊泉清涵竹影種梅地冷帶苔痕生前已自全名節身後從誰問子孫惟是年年寒食日遊人來與酹清尊多景樓一帶青山欲盡頭精藍深處著危樓下無餘地容車馬上有重櫩接斗牛鴉落野田長趂晚鴈沉煙渚最宜秋江南好景從來少北望空多故國愁賞心亭江亭如倚釣魚磯面面雲櫩勢欲飛西望汀洲依白鷺東連巷陌接烏衣六朝更代人何在千古興亡事總非客子猶憐風景好倚闌長是欲忘歸夜過馬當山獨載詩書趂野航自憐漂泊度時光殘年準擬登牛首連夜匆忙過馬當古廟荒寒江浸影斷崖凄慘石凝霜壯懷未分甘衰老回首長淮恨更長送方秋崖忠言歷歷未曽行盡載圖書出帝京餘子但知才可忌先生當以去為榮門闌竹石關心久部曲溪山照眼眀長嘯歸歟莫惆悵浙江風定自潮平時人謂與劉改之送王侍御詩匹敵喜杜仲髙移居清湖稼軒為仲髙開山田仲髙有辛田記笑携雞犬入城居無復遊從嘆闊疏河水通船堪載酒桐隂近屋可修書飯香休憶辛田米羮美何慙丙穴魚我亦買山湖上住效芹時擬貢園蔬自題信天巢有序容齋五筆載瀛鄚二州之境塘濼之上有禽二種其一類鵠色蒼而喙長凝立水際不動魚過其下則取之終日無魚亦不易地名曰信天緣其一類鶩奔走水上不分腐草泥沙必盡索乃已無一息少休名曰漫畫均度一日無飢色而反加壯大二禽稟性不同如此豫每讀之竊有感焉因榜其所居曰信天巢正甫老于文學為豫作記故併刻諸巢中信天巢小僅容身中有圖書障俗塵不與世爭間意氣且隨時養老精神破鐺安穩齊鐘鼎短褐參差比縉紳渴飲三杯飢二飯主人日用未為貧靜對靜對爐煙一縷霞謝天成就淡生涯安排瓦硯臨章草收拾瓷瓶插鄭花莫問家儲無儋石休嫌人事似團沙三杯竟醉醒時晚卧看春雲送日斜無計無計留連日爭來斷送春落花終日雨流水一溪雲山鳥呼名急林梢著色新詩成真漫興吾懶事因循喜南仲姪來自從清曉到黃昏間坐間眠深閉門猶子雨中來息擔老夫燈下起開樽故山墳墓何人守舊宅園亭幾處存問答恍然如隔世若非沉醉定消魂清眀日對酒南北山頭多墓田清眀祭掃各紛然紙灰飛作白蝴蝶淚血染成紅杜鵑日落狐狸眠塜上夜歸兒女笑燈前人生有酒須當醉一滴何曽到九泉趙忠定公帥蜀時題雪錦樓有扁舟衡嶽問歸程之句後人以為讖題跋者甚多邵使君以墨本見贈敬書其後九鼎重安國勢牢功名易辦謗難逃手扶日月掃雲霧身在江湖直羽毛雪錦詩成如讖兆金縢書啓見勤勞紛紛論定知忠定不負中朝兩字褒客枕客枕眠僧舍巍然鶴髮翁事如前日異心與少年同一夜送春雨五更臨曉風夢回思往事愁在不言中度仙霞嶺盡日度仙霞西風吹鬢華乍寒拋白苧臨晚見黃花山險全無路溪晴半是沙嶺雲逢宿處斜月帶棲鴉廬山道中沿路梅花管送迎廬山初别雪初晴若無急事相驅役有酒人家便不行采石采石興亡地聲名宇宙齊山眉間吳楚江口折東西今古多遺恨英雄幾噬臍征塵何日盡北望轉悲悽嘆息嘆息間身不自如長年借屋客中居事多只為人情熟貧甚還因世法疏兄弟候歸應有夢交遊散去更無書攢心萬感爭催老白髮蕭騷欲滿梳拜尹和靖先生墓先君受業先生之門和靖祠堂在半村敬瞻遺像憶師門洛中雖去名猶重吳下曽來道益尊言立豈徒規後學書存端可識真源瓣香再拜公應鑒自愧傳衣忝嫡孫經李謫仙墓蕭蕭髙塜倚雲根父老相傳太白墳白骨定隨風月冷青山常共姓名存平生出處猶如見一死浮沉那可論客子開元書記後故來澆酒些消魂輦下酒市多祭二郎祠山神簫鼓喧天閙酒行二郎賽罷賽張王愚民可煞多忘本香火何曽到杜康重陽述懷年年客裏過佳期時節難逢莫皺眉酒量且為重九盡杯行不必再三辭登髙興懶詩仍賦懷古情深淚自垂縱使西風落烏帽黃花猶戀鬢邉絲歸來歸來成倦客隨分樂間居供佛換新水課兒溫舊書已荒三徑菊且種一園蔬來往多鄰舍餘無長者車秋夜遊無量院僧間甘寂寞寺古絶紛華鳥摘過墻棗猿爭守樹楂雨多溪沒井藤老蔓緣笆莫坐庭前石怕傷苔蘚花破屋破屋三間書五車一翁醉髮老髿髿蕭墻甚窄難栽竹草地雖平不種花井淺自能供日用樓髙誰怕被雲遮過門人問何人住題扇橋西百姓家雜興短帽輕盈出晚巒兒童夾道競來看老夫何足驚人眼為有猿猴把釣竿冬日書懷用正甫韻慣將雙手托虛空嵗事雖窮道不窮身健不知行路逺心安還與在家同客携酒至一樽緑兄寄書來三印紅看罷兄書斟客酒間愁無事置胸中挽陳復齋二首封章字少納忠多袖疏前陳無奈何但得中天行日月不愁平地起風波臺官論罪終投筆山賊聞名亦倒戈惆悵脊梁如鐵硬天奚忍使閟山阿憂世心勞鬢易斑笑顰還與世相關秋霜烈日君臣際和氣春風母子間學道期傳千載統獻言先辦一生間堂堂仰止人何在只有名如不動山同周晉仙夜宿闕更有詩人窮似我夜深來共紙衾眠桂玉蕊琅玕樹天香知易薰露寒清透骨風定逺含芬對菊三首白白黃黃自嵗寒詩翁但作菊花看牡丹茉莉非吾事自是時人被眼瞞親向東籬手自栽夕陽小徑重徘徊花應得似人乖覺過了重陽爛漫開愛花千古説淵眀肻把秋光不似春我重此花全晚節賸栽三徑伴間身贈相士錢子章先生受命聖眀朝鳳詔欣然脫錦袍流落子孫從有失等間軒冕未容招家貧術不因錢賣勢合平生為酒豪近日人間能食肉請君著眼看班超謝人惠書籍曽問韋編䇿重勳羣書分選張吾軍標題濟楚令心賞字畫分眀慰眼昏插架有時防鼠嚙藏家無力買香薰不如隨處堆床几檢閲時時似對君謝張致逺嵩嶽圖先世前蹤不可追君從何處得全碑上橫嵩嶽幾千丈下列齊公二四詩室號揖仙懷舊事庵名面壁認頽基青氊真是吾家物欲以瓊瑶厚報之過平原故相宅拂曉官家簿録時未曽吹徹玉參差旁人不忍聽鸚鵡猶向雕籠喚太師雨中霍地春歸喚不譍客中容易鬢星星漫山風雨櫻桃紫繞屋煙雲薜荔青姑惡恨誰能自苦子規催客厭人聽閉門獨坐難拋酒生怕離愁到短屏挽章朋舉相逄便拜十年兄自此交遊得盡情草紙抄書傳遁甲竹筒沽酒命添丁他時結屋期來往今日登門隔死生從此苕溪眀月夜小舟不復為君停春夜小窗兀兀守更殘案上詩書亦懶觀頻剪燭花聽夜雨盡垂簾影隔春寒破除夢幻從頭了安置身心向下看老子靜中消日月全然不是客長安楊花萬縷千絲拂水濵盡催飛絮送殘春風前輕薄佳人命天外飄零蕩子身繞路鋪時成素毯就泥沾處襯芳塵江頭雨過遺蹤盡留得柔條折贈人秋興老去無心世事輕但從景物略關情曉看鴈陳驚秋晚夜聽鶴聲知月眀石鼎鬻茶論水品土墻題字記花名出門更自有真樂間向通衢穩步行山行即事籃輿破曉入山家獨木橋低小徑斜屋角盡懸牛蒡菜籬根多發馬蘭花主人一笑先呼酒勸客三杯便當茶我已經年無此樂為憐身久在京華靈鷲寺靈鷲名山萬古名幾回無事繞廊行殿前流水晴猶急塔上春雲晚自生鶴傍經牀聽梵語鳥窺齋鉢候鐘聲我來借得團蒲坐歸去間眠夢亦清老將垂頭終日坐當門兩臂蒼龍隱墨紋笑撚白鬚傳陳法手攤黃紙説君恩中年主帥皆為鬼晚嵗虞兵見領軍每勸兒孫學刀箭解衣教看舊瘢痕秋夜書懷眀滅孤鐙縹眇香沉沉更漏隔宫墻秋風倦客家千里夜雨懷人天一方世事從他多鉏鋙生涯如我亦淒涼亟須喚酒消長夜休夢黃花繞澗傍投老投老才營一把茅前臨官路後林坳最憐雞犬無鄰舍好放牛羊有近郊春韭採來勝市食秋鱸留取續山肴吾廬誰道難尋覔古樹排門盡鵲巢虎丘寺西出吳門步屧輕浮屠喚客入山行石從試劒何年製池自通泉盡日平煙徑逺傳僧磬響雲龕深鎖佛鐙眀移舟更宿楓橋寺要聽踈鐘半夜鳴焦山山擁中流翠作堆四圍竹樹鬱崔巍殿前雲向櫩牙出門外潮從海口來乞食僧歸齋鼓動打碑人去渡頭開焦公羽化將名迹付與瞿曇亦壯哉蛾眉寺千尺懸崖巨浪撞危亭髙峙對微范逺峯凝黛雙蛾淡流水連雲一帶長日落江容難可畫天寒山色不成粧停舟欲試登臨眼北望青煙欲斷腸凌歊臺宋祖髙臺山上頭三間破屋蔽層丘離離荒草迷行殿漠漠寒沙擁故洲塔影逺招孤客恨江聲長替古人愁題詩自舊知多少清絶難磨許郢州三峽橋倦遊華髮冷蕭騷長夏來登三峽橋山吐濕雲何日盡溪流凍雪幾時消陸公泉在猶堪汲五老峯髙不易招客子倚闌思羽化未仙衣袂已飄飄雪堂勝地從來迹易陳東坡日月久猶新小橋曽壓歸時雪老柳長搖别後春城郭寥寥懷獨鶴江山歷歷見斯人吾生較晚空惆悵夢想陳潘結舊鄰竹樓老竹平分當建瓴小樓從此擅髙名地連雲堞登臨穩欄俯晴江夢寐清一記自能追正始三間誰與續咸平濤音日日煙中落依約焚香讀易聲八月旦日永定寺作呈方丕甫蕭然一室坐清虛又見西風到客居老去身心便懶惰人來情意任親踈從僧借地秋移菊與佛分鐙夜讀書幽事復為行計奪去留端的合何如小樓小樓終日脫冠巾白髮蕭踈不受塵雖是客身猶足樂苦無世界未為貧家書逺寄憑遊子邸報頻看念故人自歎此心清似水為他間事惱天真清眀日約宋正甫黃行之兄弟為東湖之集自在嬉遊遍四方不曾孤負獨春光醉眠芳草衣裳冷笑嚼名花齒頰香既是煙霞令久住豈應風月斷來章故人尚有間情不相伴湖邊舉一觴過方孚若寺丞故廬詩境園林萬栁間四圍秋草帶愁顔樓臺寂寞鼠成穴巖石崔巍蚊負山三徑昔嫌前輩窄一區今欠此翁間客來莫怪匆匆去萬感催人鬢易斑宿囊山寺小泊囊山古化城山林端足擅髙名樓臺影外秋風老鐘磬聲中夜氣清客子情懷宜淡薄主人言語亦分眀只應海月堂前境從此江湖有夢成潛夫約中途遣詩相送至江山無耗寄詩督之望詩十步九回頭目斷江山望未休所幸臨行曽舉似僅能記憶可遮羞碧雲漏日村村雨紅樹吟風葉葉秋不見夜光生歇處客身却恨欠遲留門徑門徑蕭然獨自居入無給侍出無車江湖故舊音塵絶里巷遊從酒盞踈豪舉已拋三尺劒神交惟有一床書吾兄白髮家空谷嵗晚燈前最憶渠清眀日招社友面皮如鐵鬢如絲依舊粗豪似向時嗜酒更拚三日醉看花因費一春詩生前富貴誰能必身後聲名我不知且趂酴醿對醽醁共來相與一伸眉感懷二首漂泊南州又過年恰如杜子客鄜川酒堪度日難為醉詩怕傷時未可傳店舍無煙兵火後街坊有月試燈前荒涼古驛聞吹笛老淚縱橫落枕邉行過千山復萬山不應蜀道若為難數莖髮向殊方白一寸心從故國丹弓軟臂無三斗力杯深量欠十分寬粗豪到了非吾事只合家居度嵗寒同劉潛夫登烏石山望海有懷方孚石柯東海陳復齋舊遊念念思歸身欲翰舊題無暇遍尋看故人盡入黃泉路逺客空登烏石山休起癡心乘九鯉莫勞病眼望三韓神仙未必知吾事道在何妨兩鬢斑仙遊何氏弟兄九人各乘一鯉飛升懷安王宰索得助亭詩奉題一首亭在唐賢好句中闌干六曲盡春風不知腳下是官府但見面前如渚宮江水逢潮音激切山雲因雨思溟濛主人雅興居詩外花影琴聲事事工清眀日延平道上自從閩嶠至延平試問歸途第幾程人向煙嵐深處出鳥依雲樹密邊鳴潤沾破屐春泥滑寒入征衫曉雨晴多謝山家插楊柳報儂今日是清眀秋隂冉冉日將暮蕭蕭秋欲殘浮雲低閣雨宿靄密藏山扇覺輕蒲重衣嫌細葛單更交一寒暑精進獨衰顔富陽縣秋日古井梧桐老平田䆉稏收雞豚百里社砧杵十分秋乾鵲催歸興寒蟬喚客愁銜杯憶霜蟹沙尾莫停舟小樓夜雨心懶緣忘世身間為不才客愁隨病散老眼共書開嗜酒有天戒愛花無地栽小樓風雨夜還我鼻如雷建昌道上凛凛北風徑行行西路賖客情甘淡薄世事苦參差酒易逢知己詩難遇作家林間數點雪錯認是梅花隆興借東湖驛度夏雜題西風來幾日荷葉早衰容百感聞秋笛孤吟答晚鐘事能如意少酒不教愁濃憶著蓴鱸美家山隔幾重春日雜興二首櫩鈴奏曲響珊珊盡日重門不啓關多插瓶花供宴坐為渠消受一春間春歸門巷靜深深老去無情不強吟風絮入簾晴晝永自燒香餅試花沈雨中濃雲漠漠雨飛飛不放東風取次吹先自一春晴意少那堪梅子欲黃時山堂即事杜鵑聲裏桐花落山館無人晝掩扄老去未能忘結習自調濃墨寫黃庭秋夜老去驚秋白髮添不禁涼吹逼踈簾樓髙幸自蛩聲逺爭奈梧桐又傍櫩孺子祠堂三間官屋老湖濵孺子名聲日日新下榻本非天上事後人空自愧前人西湖二首淺水搖船冷戞沙平林暝色接棲鴉湖邊老樹垂垂白半是梅花半雪花老鶴無蹤野鴨飛鳴琴聲裏畫船歸傷心舊日經行地不獨人非物亦非鬱孤臺十年重上鬱孤臺帶得江湖白髮來滿眼青山舊相識晚為羣噪莫驚猜登臨猶覺酒邉豪往事新愁付一陶深淺不常章貢水崆洞只似舊時髙澗傍菊花歷寂黃花老澗傍不因風雨減清芳從教衰謝隨秋草到了能全晚節香附録髙鵬飛林湖遺稿次王元吉詠梅約略陽和動琯灰南枝已冠百花魁莫教隴驛携春去
